name: Release (CUDA 13.3 only)

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
  push:
    branches:
      - gemma4-mtp          # trigger on push to this branch

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON"

jobs:
  check_release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  windows-cuda-13:
    needs: check_release
    if: needs.check_release.outputs.should_release == 'true'
    runs-on: windows-2022
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "tools/ui/package-lock.json"

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-cuda-13.3
          variant: ccache
          evict-old-files: 1d

      - name: Install CUDA 13.3 Toolkit
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: "13.3"

      - name: Install Ninja
        run: choco install ninja

      - name: Build ggml-cuda.dll
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CPU=OFF ^
            -DGGML_CUDA=ON ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_CUDA_CUB_3DOT2=ON
          cmake --build build --config Release -j %NUMBER_OF_PROCESSORS% --target ggml-cuda

      - name: Pack ggml-cuda.dll
        run: |
          7z a -snl llama-bin-win-cuda-13.3-x64.zip .\build\bin\Release\ggml-cuda.dll

      - name: Pack CUDA runtime DLLs
        run: |
          $dst='.\build\bin\cudart\'
          robocopy "$env:CUDA_PATH\bin" $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll
          robocopy "$env:CUDA_PATH\lib" $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll
          robocopy "$env:CUDA_PATH\bin\x64" $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll
          7z a cudart-llama-bin-win-cuda-13.3-x64.zip $dst\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: |
            llama-bin-win-cuda-13.3-x64.zip
            cudart-llama-bin-win-cuda-13.3-x64.zip
          name: cuda-13.3-artifacts

  release:
    needs: [windows-cuda-13]
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/gemma4-mtp') || github.event.inputs.create_release == 'true' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: ./release

      - name: Create GitHub Release
        id: create_release
        uses: ggml-org/action-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          body: |
            Windows CUDA 13.3 build for `gemma4-mtp` branch.
            Contains `ggml-cuda.dll` and required CUDA runtime DLLs.

      - name: Upload release assets
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const release_id = '${{ steps.create_release.outputs.id }}';
            const files = fs.readdirSync('./release');
            for (const file of files) {
              if (file.endsWith('.zip')) {
                console.log(`Uploading ${file}`);
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release_id,
                  name: file,
                  data: await fs.readFileSync(`./release/${file}`)
                });
              }
            }
