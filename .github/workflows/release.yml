name: Windows CUDA 13.3 Full Build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
  push:
    branches:
      - gemma4-mtp

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON"

jobs:
  check_release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  windows-cuda-full:
    needs: check_release
    if: needs.check_release.outputs.should_release == 'true'
    runs-on: windows-2022
    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "tools/ui/package-lock.json"

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-cuda-13.3-full
          variant: ccache
          evict-old-files: 1d

      - name: Install CUDA 13.3 Toolkit
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: "13.3"

      - name: Install Ninja
        run: choco install ninja

      - name: Build all tools
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CPU_ALL_VARIANTS=ON ^
            -DGGML_CUDA=ON ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_CUDA_CUB_3DOT2=ON ^
            %CMAKE_ARGS%
          cmake --build build --config Release -j %NUMBER_OF_PROCESSORS%

      - name: Copy CUDA runtime DLLs
        run: |
          $dst = "build\bin\Release"
          Copy-Item "$env:CUDA_PATH\bin\cudart64_13.dll" $dst
          Copy-Item "$env:CUDA_PATH\bin\cublas64_13.dll" $dst
          Copy-Item "$env:CUDA_PATH\bin\cublasLt64_13.dll" $dst
          # OpenMP runtime (if needed)
          Copy-Item "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC\14.44.35112\debug_nonredist\x64\Microsoft.VC143.OpenMP.LLVM\libomp140.x86_64.dll" $dst -ErrorAction SilentlyContinue

      - name: Determine tag name (from official action)
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Pack artifacts like official release
        run: |
          $tag = "${{ steps.tag.outputs.name }}"
          if (-not $tag) { $tag = "cuda13.3-$(Get-Date -Format 'yyyyMMdd-HHmmss')" }
          $zipName = "llama-${tag}-bin-win-cuda-13.3-x64.zip"
          Compress-Archive -Path "build\bin\Release\*" -DestinationPath $zipName
          Write-Output "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-cuda-full-package
          path: ${{ env.ZIP_NAME }}

  release:
    needs: windows-cuda-full
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/gemma4-mtp') || github.event.inputs.create_release == 'true' }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          name: windows-cuda-full-package

      - name: Generate valid tag name
        id: tag
        run: |
          # Use date+time+short commit hash
          TAG="cuda13.3-$(date +'%Y%m%d-%H%M%S')-${GITHUB_SHA::7}"
          echo "name=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Windows CUDA 13.3 Full Build - gemma4-mtp"
          body: |
            Full Windows build with CUDA 13.3 support for the `gemma4-mtp` branch.
            Contains all executables (`llama-cli.exe`, `llama-server.exe`, etc.) and required DLLs.
          files: |
            *.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
