name: Release

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
        default: true

  push:
    branches:
      - gemma4-mtp
    paths:
      - '.github/workflows/release.yml'
      - '**/CMakeLists.txt'
      - '**/.cmake'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.cu'
      - '**/*.cuh'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
  CUDA_VERSION: '13.3'
  CMAKE_ARGS: "-DLLAMA_BUILD_EXAMPLES=OFF -DLLAMA_BUILD_TESTS=OFF -DLLAMA_BUILD_TOOLS=ON -DLLAMA_BUILD_SERVER=ON -DGGML_RPC=ON"

jobs:
  check_release:
    runs-on: ubuntu-latest

    outputs:
      should_release: ${{ steps.check.outputs.should_release }}

    steps:
      - id: check
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/gemma4-mtp" ]]; then
            if echo "${{ github.event.head_commit.message }}" | grep -q '\[no release\]'; then
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

  windows-cuda:
    needs: [check_release]
    if: ${{ needs.check_release.outputs.should_release == 'true' }}

    runs-on: windows-2022

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "tools/ui/package-lock.json"

      - name: Install ccache
        uses: ggml-org/ccache-action@v1.2.21
        with:
          key: windows-cuda-${{ env.CUDA_VERSION }}
          variant: ccache
          evict-old-files: 1d

      - name: Install CUDA Toolkit
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: ${{ env.CUDA_VERSION }}

      - name: Install Ninja
        id: install_ninja
        run: |
          choco install ninja

      - name: Build
        id: cmake_build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CPU=ON ^
            -DGGML_CPU_ALL_VARIANTS=OFF ^
            -DGGML_CUDA=ON ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DGGML_CUDA_CUB_3DOT2=ON ^
            ${{ env.CMAKE_ARGS }}
          set /A NINJA_JOBS=%NUMBER_OF_PROCESSORS%-1
          cmake --build build --config Release -j %NINJA_JOBS%

      - name: Copy CUDA runtime DLLs
        shell: pwsh
        run: |
          Write-Host "CUDA install location: $env:CUDA_PATH"

          $dst = ".\build\bin\Release"
          New-Item -ItemType Directory -Force -Path $dst | Out-Null

          function Copy-CudaDlls {
            param([string]$Source)

            if (Test-Path $Source) {
              robocopy $Source $dst cudart64_*.dll cublas64_*.dll cublasLt64_*.dll
              if ($LASTEXITCODE -le 7) {
                $global:LASTEXITCODE = 0
              }
            }
          }

          Copy-CudaDlls "$env:CUDA_PATH\bin"
          Copy-CudaDlls "$env:CUDA_PATH\lib"
          Copy-CudaDlls "$env:CUDA_PATH\bin\x64"

      - name: Add license
        shell: pwsh
        run: |
          Copy-Item LICENSE .\build\bin\Release\

      - name: Pack artifacts
        id: pack_artifacts
        shell: pwsh
        run: |
          7z a -snl llama-bin-win-cuda-${{ env.CUDA_VERSION }}-x64.zip .\build\bin\Release\*

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: llama-bin-win-cuda-${{ env.CUDA_VERSION }}-x64.zip
          name: llama-bin-win-cuda-${{ env.CUDA_VERSION }}-x64.zip

  release:
    needs:
      - windows-cuda

    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/gemma4-mtp') || github.event.inputs.create_release == 'true' }}

    permissions:
      contents: write

    runs-on: ubuntu-latest

    outputs:
      tag_name: ${{ steps.tag.outputs.name }}

    steps:
      - name: Clone
        id: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine tag name
        id: tag
        uses: ./.github/actions/get-tag-name

      - name: Download artifacts
        id: download-artifact
        uses: actions/download-artifact@v7
        with:
          path: ./artifact
          merge-multiple: true

      - name: Move artifacts
        id: move_artifacts
        run: |
          mkdir -p release

          src="artifact/llama-bin-win-cuda-${{ env.CUDA_VERSION }}-x64.zip"
          dst="release/llama-${{ steps.tag.outputs.name }}-bin-win-cuda-${{ env.CUDA_VERSION }}-x64.zip"

          echo "Moving $src to $dst"
          mv "$src" "$dst"

      - name: Create release
        id: create_release
        uses: ggml-org/action-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          body: |
            <details open>

            ${{ github.event.head_commit.message }}

            </details>

            **Windows:**
            - [Windows x64 CUDA 13.3](https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.name }}/llama-${{ steps.tag.outputs.name }}-bin-win-cuda-${{ env.CUDA_VERSION }}-x64.zip)

      - name: Upload release
        id: upload_release
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const path = require('path');
            const fs = require('fs');

            const release_id = '${{ steps.create_release.outputs.id }}';

            for (let file of await fs.readdirSync('./release')) {
              if (path.extname(file) === '.zip' || file.endsWith('.tar.gz')) {
                console.log('uploadReleaseAsset', file);
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release_id,
                  name: file,
                  data: await fs.readFileSync(`./release/${file}`)
                });
              }
            }
